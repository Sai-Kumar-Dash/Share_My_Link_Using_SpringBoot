<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex flex-col items-center justify-center min-h-screen text-white px-4">
<div class="bg-gray-800 p-6 sm:p-10 rounded-xl w-full max-w-md text-center">
    <h2 class="text-2xl sm:text-3xl font-bold mb-6">Send Link</h2>
    <input id="link" placeholder="Paste your link"
           class="w-full p-3 rounded text-black mb-4 text-sm sm:text-base"/>
    <button onclick="sendLink()"
            class="bg-blue-500 hover:bg-blue-600 w-full p-3 rounded-lg text-sm sm:text-base">
        Generate Code
    </button>
    <h3 id="code" class="text-2xl mt-6 text-green-400 font-bold tracking-widest"></h3>
    <a href="dashboard.html"
       class="inline-block mt-6 text-gray-400 hover:text-white text-sm">
        ← Back to Dashboard
    </a>
</div>

<!-- Footer -->
<footer class="mt-8 text-gray-500 text-sm text-center">
    Made by <span class="text-yellow-400 font-semibold">Sai Kumar Dash</span>
</footer>

<script src="js/share.js"></script>
</body>
</html>
